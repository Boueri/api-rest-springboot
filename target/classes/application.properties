# ===================================================================
# CONFIGURAÇÕES DO BANCO DE DADOS H2 (EM MEMÓRIA)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:projetodb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# CONFIGURAÇÕES DO HIBERNATE / JPA PARA H2
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# ATIVAR PAINEL WEB DO H2 (CONSOLES)
# ===================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Libera o acesso ao painel do H2 mesmo com o Spring Security ativo
spring.h2.console.settings.web-allow-others=true

# ===================================================================
# DOCUMENTAÇÃO SWAGGER / OPENAPI
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html